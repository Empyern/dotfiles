general {
	disable_loading_bar = true
	hide_cursor = true
}
background {
	path = w.png
}
#Time
label {
	text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = rgba(255, 255, 255, 0.6)
	font_size = 60
	font_family = JetBrains Mono Nerd Font Mono ExtraBold
	position = 0, -300
	halign = center
	valign = top
}
#Date
label {
	text = cmd[] echo "$(date +"%e %B %Y")"
	color = rgba(255, 255, 255, 0.6)
	font_size = 20
	font_family = JetBrains Mono Nerd Font Mono Bold
	position = 0, -400
	halign = center
	valign = top
}
label {
	text = cmd[] echo "$(date +"%d/%m/%Y")"
	color = rgba(255, 255, 255, 0.6)
	font_size = 15
	font_family = JetBrains Mono Nerd Font Mono Bold
	position = 0, -440
	halign = center
	valign = top
}
